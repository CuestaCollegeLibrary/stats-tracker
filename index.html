<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cuesta Library — Interactions &amp; Usage Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
/* ── Cuesta Library Tracker ───────────────────────────────────────────
   Design language: library catalog card. Cream card stock, ledger-green
   ink, brass accents, a typewriter/mono face for anything numeric —
   because this app's whole job is counting things precisely.
   ─────────────────────────────────────────────────────────────────── */

@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --paper: #efead6;
  --paper-raised: #f7f3e4;
  --ink: #1b2a3d;
  --ink-soft: #4a5568;
  --forest: #1f3a2e;
  --forest-light: #3e6350;
  --brass: #a9822f;
  --brass-light: #cba54b;
  --stamp-red: #8b3a2b;
  --card-line: #c9bf9e;
  --card-shadow: 0 2px 0 rgba(27, 42, 61, 0.06), 0 8px 20px -12px rgba(27, 42, 61, 0.25);

  --font-display: 'Lora', Georgia, serif;
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
}

body {
  background-image:
    linear-gradient(var(--card-line) 1px, transparent 1px);
  background-size: 100% 32px;
  background-attachment: local;
}

#app { max-width: 920px; margin: 0 auto; padding: 28px 20px 80px; }

/* ── Masthead ─────────────────────────────────────────────────────── */
.masthead {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 3px double var(--ink);
  padding-bottom: 14px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.masthead h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.7rem;
  margin: 0;
  color: var(--forest);
  letter-spacing: -0.01em;
}

.masthead .eyebrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--brass);
  display: block;
  margin-bottom: 2px;
}

.session-tag {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  gap: 10px;
}

.session-tag button {
  background: none;
  border: 1px solid var(--card-line);
  color: var(--ink-soft);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  padding: 4px 10px;
  border-radius: 3px;
  cursor: pointer;
}
.session-tag button:hover { border-color: var(--stamp-red); color: var(--stamp-red); }

/* ── Catalog card ─────────────────────────────────────────────────── */
.card {
  background: var(--paper-raised);
  border: 1px solid var(--card-line);
  border-radius: 4px;
  box-shadow: var(--card-shadow);
  padding: 24px 24px 22px;
  margin-bottom: 22px;
  position: relative;
}

.card::before {
  /* perforated top edge, like a punch card */
  content: "";
  position: absolute;
  top: -1px; left: 16px; right: 16px;
  height: 1px;
  background-image: radial-gradient(circle, var(--paper) 1.5px, transparent 1.6px);
  background-size: 10px 1px;
  background-repeat: repeat-x;
}

.card h2 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  margin: 0 0 4px;
  color: var(--forest);
}

.card .card-sub {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin: 0 0 18px;
}

/* ── Nav tabs (role switch for tech services) ────────────────────── */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.tab {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 7px 14px;
  border: 1px solid var(--card-line);
  border-radius: 3px 3px 0 0;
  background: var(--paper);
  color: var(--ink-soft);
  cursor: pointer;
}
.tab.active {
  background: var(--forest);
  color: var(--paper-raised);
  border-color: var(--forest);
}

/* ── Forms ────────────────────────────────────────────────────────── */
label {
  display: block;
  font-size: 0.78rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
  margin: 14px 0 5px;
}
label:first-child { margin-top: 0; }

input, select, textarea {
  width: 100%;
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 9px 11px;
  border: 1px solid var(--card-line);
  border-radius: 3px;
  background: #fff;
  color: var(--ink);
}
input:focus, select:focus, textarea:focus {
  outline: 2px solid var(--brass-light);
  outline-offset: 1px;
  border-color: var(--brass);
}

input[type="number"] { font-family: var(--font-mono); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
@media (max-width: 560px) {
  .field-row, .field-row.three { grid-template-columns: 1fr; }
}

.help-text { font-size: 0.78rem; color: var(--ink-soft); margin-top: 4px; }

/* stamp button */
.btn-stamp {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--paper-raised);
  background: var(--forest);
  border: none;
  padding: 11px 22px;
  border-radius: 3px;
  cursor: pointer;
  margin-top: 20px;
  transition: transform 0.06s ease, background 0.15s ease;
}
.btn-stamp:hover { background: var(--forest-light); }
.btn-stamp:active { transform: scale(0.97) rotate(-0.5deg); }
.btn-stamp:disabled { background: var(--card-line); cursor: not-allowed; }

.btn-ghost {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink-soft);
  background: none;
  border: 1px solid var(--card-line);
  padding: 8px 14px;
  border-radius: 3px;
  cursor: pointer;
}
.btn-ghost:hover { border-color: var(--forest); color: var(--forest); }

/* ── Date stamp badge ─────────────────────────────────────────────── */
.date-stamp {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--stamp-red);
  border: 1.5px solid var(--stamp-red);
  border-radius: 3px;
  padding: 4px 10px;
  transform: rotate(-1.2deg);
  letter-spacing: 0.04em;
}

/* ── Login screen ─────────────────────────────────────────────────── */
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
}
.login-card { width: 100%; max-width: 420px; }
.role-picker { display: grid; gap: 8px; margin-bottom: 4px; }
.role-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--card-line);
  border-radius: 3px;
  padding: 12px 14px;
  cursor: pointer;
  background: #fff;
}
.role-option:hover { border-color: var(--brass); }
.role-option.selected { border-color: var(--forest); background: #f0f5f1; }
.role-option .role-name { font-weight: 600; font-family: var(--font-display); }
.role-option .role-desc { font-size: 0.78rem; color: var(--ink-soft); }

.error-msg {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--stamp-red);
  margin-top: 10px;
}

/* ── Today's log / tables ─────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td {
  text-align: left;
  padding: 7px 8px;
  border-bottom: 1px solid var(--card-line);
}
th {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
}
td.num, th.num { font-family: var(--font-mono); text-align: right; }

.empty-state {
  text-align: center;
  padding: 30px 10px;
  color: var(--ink-soft);
  font-size: 0.85rem;
}

.summary-strip {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.summary-chip {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink-soft);
  background: var(--paper);
  border: 1px solid var(--card-line);
  border-radius: 3px;
  padding: 6px 10px;
}
.summary-chip b { color: var(--forest); font-size: 0.95rem; }

/* ── Toast ────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--forest);
  color: var(--paper-raised);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  padding: 10px 18px;
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 100;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { background: var(--stamp-red); }

/* ── Dashboard chart canvas ───────────────────────────────────────── */
.chart-wrap { position: relative; height: 260px; margin-top: 10px; }

.upload-drop {
  border: 2px dashed var(--card-line);
  border-radius: 4px;
  padding: 26px;
  text-align: center;
  color: var(--ink-soft);
  font-size: 0.85rem;
  cursor: pointer;
}
.upload-drop:hover { border-color: var(--brass); color: var(--brass); }
.upload-drop input { display: none; }

@media (max-width: 560px) {
  .masthead { align-items: flex-start; }
}

</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script type="module">
// ── Configuration ──────────────────────────────────────────────────
// Fill in your own values below. This is a static page, so anyone who
// can view the deployed site can view these values too — see the
// "A note on security" section in README.md.
const CONFIG = {
  // Turso database URL. Use the "libsql://" URL from `turso db show <name>`,
  // but written as "https://" — the browser client talks HTTP, not the
  // native libsql wire protocol.
  //   libsql://cuesta-library-abc123.turso.io  →  https://cuesta-library-abc123.turso.io
  TURSO_URL: "https://YOUR-DATABASE-NAME.turso.io",

  // Get with: turso db tokens create <name>
  TURSO_AUTH_TOKEN: "YOUR_TURSO_AUTH_TOKEN",

  // Shared PIN per role. Change these before deploying.
  PINS: {
    student_worker: "1234",
    librarian: "2345",
    tech_services: "3456",
  },
};

import { createClient } from "https://esm.sh/@libsql/client@0.14.0/web";

/* ── DB CLIENT ────────────────────────────────────────────────────── */
const db = createClient({
  url: CONFIG.TURSO_URL,
  authToken: CONFIG.TURSO_AUTH_TOKEN,
});

async function run(sql, args = []) {
  return db.execute({ sql, args });
}

async function insertInteraction(row) {
  return run(
    `INSERT INTO interactions
      (entry_date, entry_hour, role, staff_name, category, subcategory, count, notes, source, report_batch_id)
     VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
    [
      row.entry_date, row.entry_hour ?? null, row.role, row.staff_name ?? null,
      row.category, row.subcategory ?? null, row.count, row.notes ?? null,
      row.source ?? "manual", row.report_batch_id ?? null,
    ]
  );
}

async function todaysEntries(role, staffName) {
  const today = todayStr();
  const res = await run(
    `SELECT id, entry_hour, category, subcategory, count, notes, created_at
     FROM interactions
     WHERE entry_date = ? AND role = ? AND (staff_name = ? OR ? = '')
     ORDER BY created_at DESC LIMIT 50`,
    [today, role, staffName || "", staffName || ""]
  );
  return res.rows;
}

async function dashboardRows(filters) {
  const clauses = ["entry_date BETWEEN ? AND ?"];
  const args = [filters.from, filters.to];
  if (filters.role) { clauses.push("role = ?"); args.push(filters.role); }
  if (filters.category) { clauses.push("category = ?"); args.push(filters.category); }
  const res = await run(
    `SELECT entry_date, entry_hour, role, category, subcategory, count
     FROM interactions WHERE ${clauses.join(" AND ")}
     ORDER BY entry_date ASC`,
    args
  );
  return res.rows;
}

/* ── LOOKUP DATA ──────────────────────────────────────────────────── */
const ROLES = [
  { key: "student_worker", name: "Student Worker", desc: "Circulation & supply counts" },
  { key: "librarian", name: "Librarian", desc: "Patron counts, sections, reference" },
  { key: "tech_services", name: "Technical Services", desc: "All of the above, plus report imports" },
];

const CIRCULATION_ITEMS = [
  ["reserve_book", "Reserve Book"], ["laptop", "Laptop"], ["calculator", "Calculator"],
  ["charger", "Charger"], ["headphones", "Headphones"], ["other_electronic", "Other Electronic"],
];
const SUPPLY_ITEMS = [
  ["scantron", "Scantron"], ["bluebook", "Blue Book"], ["notecards", "Notecards"], ["pencil", "Pencil"],
];
const SECTIONS = [
  ["main_floor", "Main Floor"], ["quiet_study", "Quiet Study"], ["group_study_rooms", "Group Study Rooms"],
  ["computer_lab", "Computer Lab"], ["periodicals", "Periodicals"], ["other_section", "Other"],
];
const SERVICES = [
  ["printing_copying", "Printing / Copying"], ["study_room_booking", "Study Room Booking"],
  ["research_help_desk", "Research Help Desk"], ["computer_use", "Computer Use"], ["other_service", "Other Service"],
];
const REFERENCE_TYPES = [
  ["quick_directional", "Quick / Directional"], ["research_consultation", "Research Consultation"],
  ["technology_help", "Technology Help"], ["citation_help", "Citation Help"], ["other_reference", "Other"],
];
const REPORT_TYPES = [
  ["door_count", "Door Count Report"], ["circulation_report", "Circulation Report"], ["other_report", "Other Report"],
];
const ALL_CATEGORIES = [
  ["circulation", "Circulation"], ["supplies", "Supplies"], ["patron_count", "Patron Count"],
  ["section_usage", "Section Usage"], ["service_usage", "Service Usage"], ["reference", "Reference Interaction"],
  ["door_count", "Door Count (import)"], ["circulation_report", "Circulation Report (import)"],
];

function hourOptions() {
  return Array.from({ length: 24 }, (_, h) => {
    const label = new Date(2000, 0, 1, h).toLocaleTimeString([], { hour: "numeric" });
    return [h, label];
  });
}

/* ── STATE ────────────────────────────────────────────────────────── */
const state = {
  role: null,
  staffName: "",
  view: "login",       // login | student | librarian | tech | dashboard
  techTab: "student",  // student | librarian | reports
  loginError: "",
  pickedRole: null,
};

const todayStr = () => new Date().toISOString().slice(0, 10);
const $ = (sel, root = document) => root.querySelector(sel);
const app = $("#app");

function toast(msg, isError = false) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.toggle("error", isError);
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 2600);
}

/* ── RENDER ROOT ──────────────────────────────────────────────────── */
function render() {
  if (state.view === "login") return renderLogin();
  app.innerHTML = `
    <div class="masthead">
      <div>
        <span class="eyebrow">Cuesta College Library</span>
        <h1>Interactions &amp; Usage Tracker</h1>
      </div>
      <div class="session-tag">
        <span class="date-stamp">${todayStr()}</span>
        <span>${state.staffName ? escapeHtml(state.staffName) + " · " : ""}${roleLabel(state.role)}</span>
        <button id="logoutBtn">Log out</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div id="viewBody"></div>
  `;
  $("#logoutBtn").onclick = () => { Object.assign(state, { role: null, staffName: "", view: "login", loginError: "" }); render(); };
  renderTabs();
  renderViewBody();
}

function roleLabel(key) { return ROLES.find(r => r.key === key)?.name ?? key; }

function renderTabs() {
  const tabsEl = $("#tabs");
  let tabs = [];
  if (state.role === "tech_services") {
    tabs = [["student", "Circulation & Supplies"], ["librarian", "Patrons & Reference"], ["reports", "Report Imports"], ["dashboard", "Dashboard"]];
  } else if (state.role === "student_worker") {
    tabs = [["student", "Log Entry"]];
  } else if (state.role === "librarian") {
    tabs = [["librarian", "Log Entry"], ["dashboard", "Dashboard"]];
  }
  const active = state.role === "tech_services" ? state.techTab : (state.view === "dashboard" ? "dashboard" : (state.role === "student_worker" ? "student" : "librarian"));
  tabsEl.innerHTML = tabs.map(([key, label]) =>
    `<button class="tab ${key === active ? "active" : ""}" data-tab="${key}">${label}</button>`
  ).join("");
  tabsEl.querySelectorAll(".tab").forEach(btn => {
    btn.onclick = () => {
      if (state.role === "tech_services") state.techTab = btn.dataset.tab;
      state.view = btn.dataset.tab === "reports" ? "reports" : (btn.dataset.tab === "dashboard" ? "dashboard" : (btn.dataset.tab === "student" ? "student" : "librarian"));
      render();
    };
  });
}

function renderViewBody() {
  const body = $("#viewBody");
  if (state.view === "student") return renderStudentForm(body);
  if (state.view === "librarian") return renderLibrarianForm(body);
  if (state.view === "reports") return renderReportsImport(body);
  if (state.view === "dashboard") return renderDashboard(body);
}

/* ── LOGIN ────────────────────────────────────────────────────────── */
function renderLogin() {
  app.innerHTML = `
    <div class="login-wrap">
      <div class="card login-card">
        <span class="eyebrow">Cuesta College Library</span>
        <h2>Sign in to log activity</h2>
        <p class="card-sub">Pick your role, enter your name and the shared team PIN.</p>
        <div class="role-picker" id="rolePicker"></div>
        <label for="staffName">Your name</label>
        <input id="staffName" placeholder="e.g. Del B." value="${escapeHtml(state.staffName)}" />
        <label for="pin">Team PIN</label>
        <input id="pin" type="password" inputmode="numeric" placeholder="••••" />
        <button class="btn-stamp" id="loginBtn">Enter</button>
        <div class="error-msg" id="loginError">${state.loginError || ""}</div>
      </div>
    </div>
  `;
  const picker = $("#rolePicker");
  picker.innerHTML = ROLES.map(r => `
    <div class="role-option ${state.pickedRole === r.key ? "selected" : ""}" data-role="${r.key}">
      <div><div class="role-name">${r.name}</div><div class="role-desc">${r.desc}</div></div>
      <div>${state.pickedRole === r.key ? "✓" : ""}</div>
    </div>`).join("");
  picker.querySelectorAll(".role-option").forEach(el => {
    el.onclick = () => { state.pickedRole = el.dataset.role; renderLogin(); };
  });
  $("#staffName").oninput = (e) => { state.staffName = e.target.value; };
  $("#loginBtn").onclick = () => {
    const pin = $("#pin").value.trim();
    if (!state.pickedRole) { state.loginError = "Pick a role first."; return renderLogin(); }
    if (pin !== CONFIG.PINS[state.pickedRole]) { state.loginError = "Incorrect PIN for that role."; return renderLogin(); }
    state.role = state.pickedRole;
    state.loginError = "";
    state.view = state.role === "student_worker" ? "student" : "librarian";
    state.techTab = "student";
    render();
  };
}

/* ── STUDENT WORKER FORM ──────────────────────────────────────────── */
function renderStudentForm(body) {
  body.innerHTML = `
    <div class="card">
      <h2>Circulation &amp; Supplies</h2>
      <p class="card-sub">Log each checkout or supply hand-out as it happens.</p>
      <div class="field-row">
        <div>
          <label for="scCategory">Category</label>
          <select id="scCategory">
            <option value="circulation">Circulation (reserve items / electronics)</option>
            <option value="supplies">Supplies (scantron, bluebook, etc.)</option>
          </select>
        </div>
        <div>
          <label for="scItem">Item</label>
          <select id="scItem"></select>
        </div>
      </div>
      <div class="field-row three">
        <div>
          <label for="scCount">Count</label>
          <input id="scCount" type="number" min="1" value="1" />
        </div>
        <div>
          <label for="scDate">Date</label>
          <input id="scDate" type="date" value="${todayStr()}" />
        </div>
        <div>
          <label for="scNotes">Notes (optional)</label>
          <input id="scNotes" placeholder="e.g. title, patron type" />
        </div>
      </div>
      <button class="btn-stamp" id="scSubmit">Log entry</button>
    </div>
    <div class="card">
      <h2>Today's log</h2>
      <div id="scSummary" class="summary-strip"></div>
      <div id="scTable"></div>
    </div>
  `;
  const itemSel = $("#scItem");
  const fillItems = () => {
    const items = $("#scCategory").value === "circulation" ? CIRCULATION_ITEMS : SUPPLY_ITEMS;
    itemSel.innerHTML = items.map(([k, l]) => `<option value="${k}">${l}</option>`).join("");
  };
  fillItems();
  $("#scCategory").onchange = fillItems;

  $("#scSubmit").onclick = async () => {
    const btn = $("#scSubmit");
    btn.disabled = true;
    try {
      await insertInteraction({
        entry_date: $("#scDate").value || todayStr(),
        role: state.role,
        staff_name: state.staffName,
        category: $("#scCategory").value,
        subcategory: $("#scItem").value,
        count: Math.max(1, parseInt($("#scCount").value, 10) || 1),
        notes: $("#scNotes").value || null,
      });
      toast("Logged ✓");
      $("#scNotes").value = "";
      loadStudentTable();
    } catch (err) {
      console.error(err);
      toast("Couldn't save — check connection", true);
    } finally { btn.disabled = false; }
  };

  loadStudentTable();
}

async function loadStudentTable() {
  const rows = await todaysEntries(state.role, state.staffName);
  const totalsMap = {};
  rows.forEach(r => { totalsMap[r.subcategory] = (totalsMap[r.subcategory] || 0) + r.count; });
  const label = (k) => [...CIRCULATION_ITEMS, ...SUPPLY_ITEMS].find(i => i[0] === k)?.[1] || k;

  $("#scSummary").innerHTML = Object.entries(totalsMap).length
    ? Object.entries(totalsMap).map(([k, v]) => `<div class="summary-chip">${label(k)} <b>${v}</b></div>`).join("")
    : "";

  $("#scTable").innerHTML = rows.length ? `
    <table><thead><tr><th>Time</th><th>Category</th><th>Item</th><th class="num">Count</th><th>Notes</th></tr></thead>
    <tbody>${rows.map(r => `
      <tr>
        <td>${fmtTime(r.created_at)}</td>
        <td>${r.category}</td>
        <td>${label(r.subcategory)}</td>
        <td class="num">${r.count}</td>
        <td>${escapeHtml(r.notes || "")}</td>
      </tr>`).join("")}</tbody></table>
  ` : `<div class="empty-state">No entries logged yet today.</div>`;
}

/* ── LIBRARIAN FORM ───────────────────────────────────────────────── */
function renderLibrarianForm(body) {
  body.innerHTML = `
    <div class="card">
      <h2>Patrons &amp; Reference</h2>
      <p class="card-sub">Log hourly patron counts, section usage, service usage, and reference interactions.</p>
      <div class="field-row">
        <div>
          <label for="lcCategory">Category</label>
          <select id="lcCategory">
            <option value="patron_count">Patron Count (overall, per hour)</option>
            <option value="section_usage">Section Usage</option>
            <option value="service_usage">Service Usage</option>
            <option value="reference">Reference Interaction</option>
          </select>
        </div>
        <div id="lcSubWrap" style="display:none">
          <label for="lcSub">Detail</label>
          <select id="lcSub"></select>
        </div>
      </div>
      <div class="field-row three">
        <div>
          <label for="lcCount">Count</label>
          <input id="lcCount" type="number" min="1" value="1" />
        </div>
        <div>
          <label for="lcDate">Date</label>
          <input id="lcDate" type="date" value="${todayStr()}" />
        </div>
        <div>
          <label for="lcHour">Hour</label>
          <select id="lcHour"></select>
        </div>
      </div>
      <label for="lcNotes">Notes (optional)</label>
      <input id="lcNotes" placeholder="e.g. topic, context" />
      <button class="btn-stamp" id="lcSubmit">Log entry</button>
    </div>
    <div class="card">
      <h2>Today's log</h2>
      <div id="lcSummary" class="summary-strip"></div>
      <div id="lcTable"></div>
    </div>
  `;
  const hourSel = $("#lcHour");
  const nowHour = new Date().getHours();
  hourSel.innerHTML = hourOptions().map(([h, l]) => `<option value="${h}" ${h === nowHour ? "selected" : ""}>${l}</option>`).join("");

  const subWrap = $("#lcSubWrap");
  const subSel = $("#lcSub");
  const subListFor = (cat) => cat === "section_usage" ? SECTIONS : cat === "service_usage" ? SERVICES : cat === "reference" ? REFERENCE_TYPES : null;
  const refreshSub = () => {
    const list = subListFor($("#lcCategory").value);
    if (!list) { subWrap.style.display = "none"; subSel.innerHTML = ""; return; }
    subWrap.style.display = "";
    subSel.innerHTML = list.map(([k, l]) => `<option value="${k}">${l}</option>`).join("");
  };
  refreshSub();
  $("#lcCategory").onchange = refreshSub;

  $("#lcSubmit").onclick = async () => {
    const btn = $("#lcSubmit");
    btn.disabled = true;
    try {
      await insertInteraction({
        entry_date: $("#lcDate").value || todayStr(),
        entry_hour: parseInt($("#lcHour").value, 10),
        role: state.role,
        staff_name: state.staffName,
        category: $("#lcCategory").value,
        subcategory: subWrap.style.display === "none" ? null : $("#lcSub").value,
        count: Math.max(1, parseInt($("#lcCount").value, 10) || 1),
        notes: $("#lcNotes").value || null,
      });
      toast("Logged ✓");
      $("#lcNotes").value = "";
      loadLibrarianTable();
    } catch (err) {
      console.error(err);
      toast("Couldn't save — check connection", true);
    } finally { btn.disabled = false; }
  };

  loadLibrarianTable();
}

async function loadLibrarianTable() {
  const rows = await todaysEntries(state.role, state.staffName);
  const catLabel = (k) => ALL_CATEGORIES.find(c => c[0] === k)?.[1] || k;
  const subLabel = (k) => [...SECTIONS, ...SERVICES, ...REFERENCE_TYPES].find(i => i[0] === k)?.[1] || k || "—";

  const totalsMap = {};
  rows.forEach(r => { totalsMap[r.category] = (totalsMap[r.category] || 0) + r.count; });
  $("#lcSummary").innerHTML = Object.entries(totalsMap).length
    ? Object.entries(totalsMap).map(([k, v]) => `<div class="summary-chip">${catLabel(k)} <b>${v}</b></div>`).join("")
    : "";

  $("#lcTable").innerHTML = rows.length ? `
    <table><thead><tr><th>Hour</th><th>Category</th><th>Detail</th><th class="num">Count</th><th>Notes</th></tr></thead>
    <tbody>${rows.map(r => `
      <tr>
        <td>${r.entry_hour !== null ? hourOptions()[r.entry_hour][1] : "—"}</td>
        <td>${catLabel(r.category)}</td>
        <td>${subLabel(r.subcategory)}</td>
        <td class="num">${r.count}</td>
        <td>${escapeHtml(r.notes || "")}</td>
      </tr>`).join("")}</tbody></table>
  ` : `<div class="empty-state">No entries logged yet today.</div>`;
}

/* ── REPORT IMPORTS (tech services) ──────────────────────────────── */
function renderReportsImport(body) {
  body.innerHTML = `
    <div class="card">
      <h2>Report Imports</h2>
      <p class="card-sub">
        Upload a CSV export (door counts, circulation reports, etc). The file needs a
        <code>date</code> column and a <code>count</code> column at minimum — optional
        <code>hour</code> and <code>label</code> columns will be mapped in too.
      </p>
      <label for="riType">Report type</label>
      <select id="riType">${REPORT_TYPES.map(([k, l]) => `<option value="${k}">${l}</option>`).join("")}</select>
      <label>File</label>
      <div class="upload-drop" id="riDrop">
        <input type="file" id="riFile" accept=".csv" />
        <span id="riDropLabel">Click to choose a CSV file, or drag one here</span>
      </div>
      <div id="riPreview"></div>
    </div>
  `;
  const drop = $("#riDrop");
  const fileInput = $("#riFile");
  drop.onclick = () => fileInput.click();
  drop.ondragover = (e) => e.preventDefault();
  drop.ondrop = (e) => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
  fileInput.onchange = () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); };

  let parsedRows = [];

  function handleFile(file) {
    $("#riDropLabel").textContent = file.name;
    window.Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        parsedRows = normalizeCsvRows(results.data);
        renderPreview(file.name, parsedRows);
      },
      error: (err) => toast("Couldn't parse CSV: " + err.message, true),
    });
  }

  function renderPreview(fileName, rows) {
    const bad = rows.filter(r => !r.entry_date || isNaN(r.count));
    $("#riPreview").innerHTML = `
      <p class="help-text">${rows.length} rows detected${bad.length ? `, <span style="color:var(--stamp-red)">${bad.length} missing date/count and will be skipped</span>` : ""}.</p>
      <table><thead><tr><th>Date</th><th>Hour</th><th>Label</th><th class="num">Count</th></tr></thead>
      <tbody>${rows.slice(0, 8).map(r => `
        <tr><td>${r.entry_date || "—"}</td><td>${r.entry_hour ?? "—"}</td><td>${r.label || "—"}</td><td class="num">${isNaN(r.count) ? "—" : r.count}</td></tr>
      `).join("")}</tbody></table>
      ${rows.length > 8 ? `<p class="help-text">…and ${rows.length - 8} more.</p>` : ""}
      <button class="btn-stamp" id="riConfirm">Import ${rows.length - bad.length} rows</button>
    `;
    $("#riConfirm").onclick = () => confirmImport(fileName, rows.filter(r => r.entry_date && !isNaN(r.count)));
  }

  async function confirmImport(fileName, rows) {
    const btn = $("#riConfirm");
    btn.disabled = true;
    try {
      const reportType = $("#riType").value;
      const batch = await run(
        `INSERT INTO report_uploads (file_name, report_type, uploaded_by, row_count) VALUES (?, ?, ?, ?)`,
        [fileName, reportType, state.staffName, rows.length]
      );
      const batchId = Number(batch.lastInsertRowid);
      for (const r of rows) {
        await insertInteraction({
          entry_date: r.entry_date,
          entry_hour: r.entry_hour,
          role: state.role,
          staff_name: state.staffName,
          category: reportType,
          subcategory: r.label || null,
          count: r.count,
          notes: null,
          source: "csv_import",
          report_batch_id: batchId,
        });
      }
      toast(`Imported ${rows.length} rows ✓`);
      $("#riPreview").innerHTML = "";
      fileInput.value = "";
      $("#riDropLabel").textContent = "Click to choose a CSV file, or drag one here";
    } catch (err) {
      console.error(err);
      toast("Import failed — check connection", true);
    } finally { btn.disabled = false; }
  }
}

function normalizeCsvRows(rows) {
  return rows.map(r => {
    const lower = {};
    Object.keys(r).forEach(k => { lower[k.trim().toLowerCase()] = r[k]; });
    const dateRaw = lower.date || lower.entry_date || lower.day;
    const entry_date = dateRaw ? new Date(dateRaw).toISOString().slice(0, 10) : null;
    const hourRaw = lower.hour ?? lower.entry_hour;
    const entry_hour = hourRaw !== undefined && hourRaw !== "" ? parseInt(hourRaw, 10) : null;
    const countRaw = lower.count ?? lower.total ?? lower.value;
    const count = parseInt(countRaw, 10);
    const label = lower.label || lower.section || lower.type || lower.category || null;
    return { entry_date, entry_hour, count, label };
  });
}

/* ── DASHBOARD ────────────────────────────────────────────────────── */
function renderDashboard(body) {
  const from = new Date(); from.setDate(from.getDate() - 13);
  body.innerHTML = `
    <div class="card">
      <h2>Dashboard</h2>
      <p class="card-sub">Aggregated activity across all roles.</p>
      <div class="field-row three">
        <div><label for="dFrom">From</label><input id="dFrom" type="date" value="${from.toISOString().slice(0,10)}" /></div>
        <div><label for="dTo">To</label><input id="dTo" type="date" value="${todayStr()}" /></div>
        <div><label for="dRole">Role</label><select id="dRole"><option value="">All roles</option>${ROLES.map(r => `<option value="${r.key}">${r.name}</option>`).join("")}</select></div>
      </div>
      <label for="dCategory">Category</label>
      <select id="dCategory"><option value="">All categories</option>${ALL_CATEGORIES.map(([k, l]) => `<option value="${k}">${l}</option>`).join("")}</select>
      <button class="btn-stamp" id="dRun">Update dashboard</button>
    </div>
    <div class="card">
      <h2>Totals by category</h2>
      <div id="dTotals" class="summary-strip"></div>
    </div>
    <div class="card">
      <h2>Daily activity</h2>
      <div class="chart-wrap"><canvas id="dChart"></canvas></div>
    </div>
  `;
  let chartInstance = null;

  async function run_() {
    const filters = {
      from: $("#dFrom").value, to: $("#dTo").value,
      role: $("#dRole").value, category: $("#dCategory").value,
    };
    const rows = await dashboardRows(filters);

    const catTotals = {};
    const dayTotals = {};
    rows.forEach(r => {
      catTotals[r.category] = (catTotals[r.category] || 0) + r.count;
      dayTotals[r.entry_date] = (dayTotals[r.entry_date] || 0) + r.count;
    });

    $("#dTotals").innerHTML = Object.entries(catTotals).length
      ? Object.entries(catTotals).sort((a, b) => b[1] - a[1]).map(([k, v]) =>
          `<div class="summary-chip">${ALL_CATEGORIES.find(c => c[0] === k)?.[1] || k} <b>${v}</b></div>`).join("")
      : `<div class="empty-state">No data in this range.</div>`;

    const days = Object.keys(dayTotals).sort();
    if (chartInstance) chartInstance.destroy();
    chartInstance = new window.Chart($("#dChart"), {
      type: "bar",
      data: {
        labels: days,
        datasets: [{ label: "Interactions", data: days.map(d => dayTotals[d]), backgroundColor: "#1f3a2e" }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
        plugins: { legend: { display: false } },
      },
    });
  }

  $("#dRun").onclick = run_;
  run_();
}

/* ── UTIL ─────────────────────────────────────────────────────────── */
function fmtTime(iso) {
  try { return new Date(iso + "Z").toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }); }
  catch { return iso; }
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

render();

</script>
</body>
</html>
