<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cuesta Library — Interactions &amp; Usage Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
<style>
/* ── Cuesta Library Tracker ───────────────────────────────────────────
   Design language: library catalog card. Cream card stock, ledger-green
   ink, brass accents, a typewriter/mono face for anything numeric —
   because this app's whole job is counting things precisely.
   ─────────────────────────────────────────────────────────────────── */

@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --paper: #efead6;
  --paper-raised: #f7f3e4;
  --ink: #1b2a3d;
  --ink-soft: #4a5568;
  --forest: #1f3a2e;
  --forest-light: #3e6350;
  --brass: #a9822f;
  --brass-light: #cba54b;
  --stamp-red: #8b3a2b;
  --card-line: #c9bf9e;
  --card-shadow: 0 2px 0 rgba(27, 42, 61, 0.06), 0 8px 20px -12px rgba(27, 42, 61, 0.25);

  --font-display: 'Lora', Georgia, serif;
  --font-body: 'IBM Plex Sans', system-ui, sans-serif;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  min-height: 100vh;
}

body {
  background-image:
    linear-gradient(var(--card-line) 1px, transparent 1px);
  background-size: 100% 32px;
  background-attachment: local;
}

#app { max-width: 920px; margin: 0 auto; padding: 28px 20px 80px; }

/* ── Masthead ─────────────────────────────────────────────────────── */
.masthead {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  border-bottom: 3px double var(--ink);
  padding-bottom: 14px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.masthead h1 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 1.7rem;
  margin: 0;
  color: var(--forest);
  letter-spacing: -0.01em;
}

.masthead .eyebrow {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--brass);
  display: block;
  margin-bottom: 2px;
}

.session-tag {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  gap: 10px;
}

.session-tag button {
  background: none;
  border: 1px solid var(--card-line);
  color: var(--ink-soft);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  padding: 4px 10px;
  border-radius: 3px;
  cursor: pointer;
}
.session-tag button:hover { border-color: var(--stamp-red); color: var(--stamp-red); }

/* ── Catalog card ─────────────────────────────────────────────────── */
.card {
  background: var(--paper-raised);
  border: 1px solid var(--card-line);
  border-radius: 4px;
  box-shadow: var(--card-shadow);
  padding: 24px 24px 22px;
  margin-bottom: 22px;
  position: relative;
}

.card::before {
  /* perforated top edge, like a punch card */
  content: "";
  position: absolute;
  top: -1px; left: 16px; right: 16px;
  height: 1px;
  background-image: radial-gradient(circle, var(--paper) 1.5px, transparent 1.6px);
  background-size: 10px 1px;
  background-repeat: repeat-x;
}

.card h2 {
  font-family: var(--font-display);
  font-size: 1.15rem;
  margin: 0 0 4px;
  color: var(--forest);
}

.card .card-sub {
  font-size: 0.85rem;
  color: var(--ink-soft);
  margin: 0 0 18px;
}

/* ── Nav tabs (role switch for tech services) ────────────────────── */
.tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.tab {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  padding: 7px 14px;
  border: 1px solid var(--card-line);
  border-radius: 3px 3px 0 0;
  background: var(--paper);
  color: var(--ink-soft);
  cursor: pointer;
}
.tab.active {
  background: var(--forest);
  color: var(--paper-raised);
  border-color: var(--forest);
}

/* ── Forms ────────────────────────────────────────────────────────── */
label {
  display: block;
  font-size: 0.78rem;
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
  margin: 14px 0 5px;
}
label:first-child { margin-top: 0; }

input, select, textarea {
  width: 100%;
  font-family: var(--font-body);
  font-size: 0.95rem;
  padding: 9px 11px;
  border: 1px solid var(--card-line);
  border-radius: 3px;
  background: #fff;
  color: var(--ink);
}
input:focus, select:focus, textarea:focus {
  outline: 2px solid var(--brass-light);
  outline-offset: 1px;
  border-color: var(--brass);
}

input[type="number"] { font-family: var(--font-mono); }

.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
@media (max-width: 560px) {
  .field-row, .field-row.three { grid-template-columns: 1fr; }
}

.help-text { font-size: 0.78rem; color: var(--ink-soft); margin-top: 4px; }

/* stamp button */
.btn-stamp {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.85rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--paper-raised);
  background: var(--forest);
  border: none;
  padding: 11px 22px;
  border-radius: 3px;
  cursor: pointer;
  margin-top: 20px;
  transition: transform 0.06s ease, background 0.15s ease;
}
.btn-stamp:hover { background: var(--forest-light); }
.btn-stamp:active { transform: scale(0.97) rotate(-0.5deg); }
.btn-stamp:disabled { background: var(--card-line); cursor: not-allowed; }

.btn-ghost {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink-soft);
  background: none;
  border: 1px solid var(--card-line);
  padding: 8px 14px;
  border-radius: 3px;
  cursor: pointer;
}
.btn-ghost:hover { border-color: var(--forest); color: var(--forest); }

/* ── Date stamp badge ─────────────────────────────────────────────── */
.date-stamp {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--stamp-red);
  border: 1.5px solid var(--stamp-red);
  border-radius: 3px;
  padding: 4px 10px;
  transform: rotate(-1.2deg);
  letter-spacing: 0.04em;
}

/* ── Login screen ─────────────────────────────────────────────────── */
.login-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
}
.login-card { width: 100%; max-width: 420px; }

.error-msg {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  color: var(--stamp-red);
  margin-top: 10px;
}

.pin-field { position: relative; }
.pin-field input { padding-right: 60px; }
.pin-toggle {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-soft);
  background: var(--paper);
  border: 1px solid var(--card-line);
  border-radius: 3px;
  padding: 5px 9px;
  cursor: pointer;
}
.pin-toggle:hover { border-color: var(--brass); color: var(--brass); }

/* ── Weekly log entries ───────────────────────────────────────────── */
.log-entry {
  padding: 12px 0;
  border-bottom: 1px solid var(--card-line);
}
.log-entry:last-child { border-bottom: none; }
.log-entry-meta {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--ink-soft);
  margin-bottom: 4px;
}
.log-entry-meta b { color: var(--forest); }
.log-entry-text {
  font-size: 0.92rem;
  color: var(--ink);
  white-space: pre-wrap;
  line-height: 1.5;
}

/* ── Today's log / tables ─────────────────────────────────────────── */
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th, td {
  text-align: left;
  padding: 7px 8px;
  border-bottom: 1px solid var(--card-line);
}
th {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
}
td.num, th.num { font-family: var(--font-mono); text-align: right; }

.empty-state {
  text-align: center;
  padding: 30px 10px;
  color: var(--ink-soft);
  font-size: 0.85rem;
}

.summary-strip {
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
  margin-bottom: 4px;
}
.summary-chip {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink-soft);
  background: var(--paper);
  border: 1px solid var(--card-line);
  border-radius: 3px;
  padding: 6px 10px;
}
.summary-chip b { color: var(--forest); font-size: 0.95rem; }

/* ── Toast ────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--forest);
  color: var(--paper-raised);
  font-family: var(--font-mono);
  font-size: 0.82rem;
  padding: 10px 18px;
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 100;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { background: var(--stamp-red); }

/* ── Dashboard chart canvas ───────────────────────────────────────── */
.chart-wrap { position: relative; height: 260px; margin-top: 10px; }

.upload-drop {
  border: 2px dashed var(--card-line);
  border-radius: 4px;
  padding: 26px;
  text-align: center;
  color: var(--ink-soft);
  font-size: 0.85rem;
  cursor: pointer;
}
.upload-drop:hover { border-color: var(--brass); color: var(--brass); }
.upload-drop input { display: none; }

/* ── Global campus toggle (in the masthead) ──────────────────────── */
.campus-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--paper);
  border: 1px solid var(--card-line);
  border-radius: 20px;
  padding: 4px;
}
.campus-toggle-label {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
  padding: 0 6px 0 8px;
}
.campus-btn {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 0.75rem;
  letter-spacing: 0.04em;
  padding: 6px 14px;
  border: none;
  border-radius: 16px;
  background: transparent;
  color: var(--ink-soft);
  cursor: pointer;
}
.campus-btn.active { background: var(--forest); color: var(--paper-raised); }
.campus-btn:not(.active):hover { color: var(--forest); }

/* ── Pill tag multi-select (circulation & supplies items) ─────────── */
.pill-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 6px;
}
.pill-option {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  padding: 9px 16px;
  border: 1px solid var(--card-line);
  border-radius: 20px;
  background: #fff;
  color: var(--ink);
  cursor: pointer;
}
.pill-option:hover { border-color: var(--brass); }
.pill-option.selected { background: var(--forest); border-color: var(--forest); color: var(--paper-raised); }
.pill-option .pill-check { display: none; font-size: 0.8rem; }
.pill-option.selected .pill-check { display: inline; }

/* ── Section count grid (patron counts) ──────────────────────────── */
.section-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 8px;
}
.section-field label { margin-top: 0; }

.total-strip {
  font-family: var(--font-mono);
  font-size: 0.9rem;
  color: var(--ink-soft);
  background: var(--paper);
  border: 1px solid var(--card-line);
  border-radius: 3px;
  padding: 10px 14px;
  margin: 16px 0;
}
.total-strip b {
  color: var(--forest);
  font-size: 1.25rem;
  margin-left: 10px;
}

/* ── Reference type chip picker ──────────────────────────────────── */
.chip-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 4px;
}
.chip-option {
  font-family: var(--font-body);
  font-size: 0.85rem;
  padding: 9px 16px;
  border: 1px solid var(--card-line);
  border-radius: 20px;
  background: #fff;
  color: var(--ink);
  cursor: pointer;
}
.chip-option:hover { border-color: var(--brass); }
.chip-option.selected { background: var(--forest); border-color: var(--forest); color: var(--paper-raised); }

/* ── READ Scale rating picker ─────────────────────────────────────── */
.read-scale-picker {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 6px;
}
.read-scale-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  text-align: left;
  border: 1px solid var(--card-line);
  border-radius: 4px;
  padding: 10px 14px;
  background: #fff;
  cursor: pointer;
  font-family: var(--font-body);
}
.read-scale-option:hover { border-color: var(--brass); }
.read-scale-option.selected { border-color: var(--forest); background: #f0f5f1; }
.read-scale-num {
  flex: none;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 1rem;
  color: var(--forest);
  width: 20px;
  text-align: center;
}
.read-scale-desc { font-size: 0.83rem; color: var(--ink); line-height: 1.4; }

@media (max-width: 560px) {
  .masthead { align-items: flex-start; }
}

</style>
</head>

<script type="module">
// ── Configuration ──────────────────────────────────────────────────
// Fill in your own values below. This is a static page, so anyone who
// can view the deployed site can view these values too — see the
// "A note on security" section in README.md.
const CONFIG = {
  TURSO_URL: "https://lib-stats-tracker-cuestacollegelibrary.aws-us-west-2.turso.io",

  TURSO_AUTH_TOKEN: "eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODM2MzQ5NjYsImlkIjoiMDE5ZjQ4ZDUtYTgwMS03NmM0LWE3YjEtZDEzNjEyMGY2YjRlIiwia2lkIjoiMktaRFFnQUt0ZEo5MXZvRURuZER6N2laTktYUDNUUnRfYXhKY0EzcEdZMCIsInJpZCI6ImZhNjcyNTIxLTczYjctNDlkNC1iMjNiLTQzNTAwZTQxYjc4OSJ9.oDsTaBh5tN3hQAUxZeBMd2FT58wAGhO6RFbJSnppYKQJyMiAn40F_krZNiA4AFxvRb5a7D40QA09WIIZirQzCw",

  // One shared password for everyone — no per-role PINs and no per-person
  // login. Change this any time.
  PASSWORD: "Cougar007@",
};

import { createClient } from "https://esm.sh/@libsql/client@0.14.0/web";

/* ── DB CLIENT ────────────────────────────────────────────────────── */
const db = createClient({
  url: CONFIG.TURSO_URL,
  authToken: CONFIG.TURSO_AUTH_TOKEN,
});

async function run(sql, args = []) {
  return db.execute({ sql, args });
}

async function insertInteraction(row) {
  return run(
    `INSERT INTO interactions
      (entry_date, entry_hour, entry_time, role, staff_name, category, subcategory, count, notes, source, report_batch_id, campus, read_scale, subject_area)
     VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)`,
    [
      row.entry_date, row.entry_hour ?? null, row.entry_time ?? null, row.role, row.staff_name ?? null,
      row.category, row.subcategory ?? null, row.count, row.notes ?? null,
      row.source ?? "manual", row.report_batch_id ?? null, row.campus ?? null, row.read_scale ?? null,
      row.subject_area ?? null,
    ]
  );
}

async function todaysEntries() {
  const today = todayStr();
  const res = await run(
    `SELECT id, entry_hour, entry_time, category, subcategory, count, notes, campus, read_scale, subject_area, created_at
     FROM interactions
     WHERE entry_date = ?
     ORDER BY created_at DESC LIMIT 100`,
    [today]
  );
  return res.rows;
}

async function dashboardRows(filters) {
  const clauses = ["entry_date BETWEEN ? AND ?"];
  const args = [filters.from, filters.to];
  if (filters.category) { clauses.push("category = ?"); args.push(filters.category); }
  if (filters.campus) { clauses.push("campus = ?"); args.push(filters.campus); }
  const res = await run(
    `SELECT entry_date, entry_hour, role, category, subcategory, count, campus
     FROM interactions WHERE ${clauses.join(" AND ")}
     ORDER BY entry_date ASC`,
    args
  );
  return res.rows;
}

async function insertWeeklyLogEntry({ campus, role, staff_name, entry_text }) {
  return run(
    `INSERT INTO weekly_log (campus, role, staff_name, entry_text) VALUES (?, ?, ?, ?)`,
    [campus, role, staff_name || null, entry_text]
  );
}

async function weeklyLogEntries(campus, from, to) {
  const res = await run(
    `SELECT id, staff_name, role, entry_text, created_at
     FROM weekly_log
     WHERE campus = ? AND date(created_at) BETWEEN ? AND ?
     ORDER BY created_at ASC`,
    [campus, from, to]
  );
  return res.rows;
}

/* ── LOOKUP DATA ──────────────────────────────────────────────────── */
// Profiles are gone — everyone shares one page with every tab. This constant
// just fills the `role` column in the database so existing queries/exports
// built around it don't break; it's no longer used to gate access to anything.
const GENERIC_ROLE = "staff";

const CAMPUSES = [
  ["slo", "San Luis Obispo Campus"],
  ["ncc", "North County Campus"],
];

const SUPPLY_ITEMS = [
  ["scantron", "Scantron"], ["bluebook", "Blue Book"], ["notecards", "Notecards"], ["pencil", "Pencil"],
];

// Sections tracked as part of the hourly patron count. Section usage and
// overall patron count are now the same form: fill in each section, and
// the total is the sum.
const LIBRARY_SECTIONS = [
  ["computers_printing", "Computers/Printing"],
  ["study_rooms", "Study Rooms"],
  ["quiet_study", "Quiet Study"],
  ["open_lab", "Open Lab"],
  ["zine_makerspace", "Zine/Makerspace"],
  ["childrens_area", "Children's Area"],
  ["events", "Events"],
];

const REFERENCE_TYPES = [
  ["quick_directional", "Quick / Directional"],
  ["computer_printing", "Computer / Printing"],
  ["research_assistance", "Research Assistance"],
  ["citation_assistance", "Citation Assistance"],
  ["other_reference", "Other"],
];

// READ Scale (Reference Effort Assessment Data) — rates the depth of
// effort a reference interaction required, 1 (least) to 6 (most).
const READ_SCALE = [
  [1, "Least effort, expertise, time, no resources"],
  [2, "Low effort, minimal expertise, nominal consultation of resources"],
  [3, "Some effort and time required, use of ready reference sources, minimal instruction involved, expertise required"],
  [4, "Multiple resources required, reference knowledge needed, subject specialist consultation, cross-referencing resources, more time, expertise, and instruction involved"],
  [5, "More substantial investigation, expertise, time; cooperative efforts, multiple resources, dialogue between librarian and patron"],
  [6, "Most effort and time required, cannot be answered on the spot, in-depth research, special libraries or primary documents involved"],
];

// Report types available in the Technical Services "Report Imports" tab.
// PHYSICAL report types ask which campus the numbers belong to; digital
// ones don't, since they aren't tied to a physical location.
const REPORT_TYPES = [
  ["circulation_report", "Physical Circulation Report"],
  ["door_count", "Door Count Report"],
  ["digital_interactions", "Digital Interactions Report"],
  ["libguides_stats", "LibGuides Stats"],
  ["page_interactions", "Page Interaction Report"],
  ["peak_usage_times", "Peak Usage Times Report"],
  ["ebook_article_circulation", "Ebook & Article Circulation"],
  ["chat_widget_stats", "Chat Widget Stat Report"],
  ["conexed_appointments", "Conexed Appointment Stats"],
  ["other_report", "Other Report"],
];
const PHYSICAL_REPORT_TYPES = new Set(["circulation_report", "door_count"]);

const ALL_CATEGORIES = [
  ["supplies", "Supplies"], ["patron_count", "Patron Count"],
  ["reference", "Reference Interaction"],
  ["circulation_report", "Physical Circulation Report (import)"], ["door_count", "Door Count (import)"],
  ["digital_interactions", "Digital Interactions (import)"], ["libguides_stats", "LibGuides Stats (import)"],
  ["page_interactions", "Page Interactions (import)"], ["peak_usage_times", "Peak Usage Times (import)"],
  ["ebook_article_circulation", "Ebook & Article Circulation (import)"],
  ["chat_widget_stats", "Chat Widget Stats (import)"], ["conexed_appointments", "Conexed Appointments (import)"],
  ["other_report", "Other Report (import)"],
];

function hourOptions() {
  return Array.from({ length: 24 }, (_, h) => {
    const label = new Date(2000, 0, 1, h).toLocaleTimeString([], { hour: "numeric" });
    return [h, label];
  });
}

function nowHHMM() {
  const d = new Date();
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}

/* ── STATE ────────────────────────────────────────────────────────── */
const state = {
  staffName: "",        // only used by the Weekly Log tab's optional "name" field — not collected at login
  view: "login",       // login | student | librarian | reference | weekly | reports | dashboard
  loginError: "",
  campus: "slo",        // the currently-toggled campus — applied to every physical stat entry
};

const todayStr = () => new Date().toISOString().slice(0, 10);
const $ = (sel, root = document) => root.querySelector(sel);
const app = $("#app");

function toast(msg, isError = false) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.toggle("error", isError);
  el.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 2600);
}

function render() {

// One shared set of tabs — no more role-based filtering, everyone sees
// every stat-tracking feature on the same page.
const TABS = [

];

/* ── WEEKLY LOG ───────────────────────────────────────────────────── */
function currentWeekRange() {
  const now = new Date();
  const day = now.getDay(); // 0 = Sunday
  const diffToMonday = day === 0 ? 6 : day - 1;
  const monday = new Date(now);
  monday.setDate(now.getDate() - diffToMonday);
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const fmt = (d) => d.toISOString().slice(0, 10);
  return { from: fmt(monday), to: fmt(sunday), mondayDate: monday };
}

function renderWeeklyLog(body) {
  const { from, to, mondayDate } = currentWeekRange();
  const weekLabel = mondayDate.toLocaleDateString([], { month: "short", day: "numeric" });

function renderReportsImport(body) {
  body.innerHTML = `
    <div class="card">
      <h2>Report Imports</h2>
      <p class="card-sub">
        Upload a CSV export — physical circulation, door counts, digital interactions, LibGuides stats,
        page-level interactions, peak usage times, ebook/article circulation, chat widget stats, or
        Conexed appointment stats. The file needs a <code>date</code> column and a <code>count</code>
        column at minimum — optional <code>hour</code>, <code>label</code>, and <code>campus</code>
        columns will be mapped in too. Physical report types (circulation, door counts) use the campus
        toggle at the top of the page unless the file has its own <code>campus</code> column.
      </p>
      <label for="riType">Report type</label>
      <select id="riType">${REPORT_TYPES.map(([k, l]) => `<option value="${k}">${l}</option>`).join("")}</select>
      <label>File</label>
      <div class="upload-drop" id="riDrop">
        <input type="file" id="riFile" accept=".csv" />
        <span id="riDropLabel">Click to choose a CSV file, or drag one here</span>
      </div>
      <div id="riPreview"></div>
    </div>
  `;

  const drop = $("#riDrop");
  const fileInput = $("#riFile");
  drop.onclick = () => fileInput.click();
  drop.ondragover = (e) => e.preventDefault();
  drop.ondrop = (e) => { e.preventDefault(); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };
  fileInput.onchange = () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); };

  let parsedRows = [];

  function handleFile(file) {
    $("#riDropLabel").textContent = file.name;
    window.Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        parsedRows = normalizeCsvRows(results.data);
        renderPreview(file.name, parsedRows);
      },
      error: (err) => toast("Couldn't parse CSV: " + err.message, true),
    });
  }

  function renderPreview(fileName, rows) {
    const isPhysical = PHYSICAL_REPORT_TYPES.has($("#riType").value);
    const bad = rows.filter(r => !r.entry_date || isNaN(r.count));
    $("#riPreview").innerHTML = `
      <p class="help-text">${rows.length} rows detected${bad.length ? `, <span style="color:var(--stamp-red)">${bad.length} missing date/count and will be skipped</span>` : ""}.</p>
      <table><thead><tr><th>Date</th><th>Hour</th><th>Label</th>${isPhysical ? "<th>Campus</th>" : ""}<th class="num">Count</th></tr></thead>
      <tbody>${rows.slice(0, 8).map(r => `
        <tr><td>${r.entry_date || "—"}</td><td>${r.entry_hour ?? "—"}</td><td>${r.label || "—"}</td>${isPhysical ? `<td>${r.campus ? campusLabel(r.campus) : "(uses campus toggle: " + campusLabel(state.campus) + ")"}</td>` : ""}<td class="num">${isNaN(r.count) ? "—" : r.count}</td></tr>
      `).join("")}</tbody></table>
      ${rows.length > 8 ? `<p class="help-text">…and ${rows.length - 8} more.</p>` : ""}
      <button class="btn-stamp" id="riConfirm">Import ${rows.length - bad.length} rows</button>
    `;
    $("#riConfirm").onclick = () => confirmImport(fileName, rows.filter(r => r.entry_date && !isNaN(r.count)));
  }

  async function confirmImport(fileName, rows) {
    const btn = $("#riConfirm");
    btn.disabled = true;
    try {
      const reportType = $("#riType").value;
      const isPhysical = PHYSICAL_REPORT_TYPES.has(reportType);
      const formCampus = isPhysical ? state.campus : null;
      const batch = await run(
        `INSERT INTO report_uploads (file_name, report_type, row_count) VALUES (?, ?, ?)`,
        [fileName, reportType, rows.length]
      );
      const batchId = Number(batch.lastInsertRowid);
      for (const r of rows) {
        await insertInteraction({
          entry_date: r.entry_date,
          entry_hour: r.entry_hour,
          role: GENERIC_ROLE,
          category: reportType,
          subcategory: r.label || null,
          count: r.count,
          notes: null,
          source: "csv_import",
          report_batch_id: batchId,
          campus: isPhysical ? (r.campus || formCampus) : null,
        });
      }
      toast(`Imported ${rows.length} rows ✓`);
      $("#riPreview").innerHTML = "";
      fileInput.value = "";
      $("#riDropLabel").textContent = "Click to choose a CSV file, or drag one here";
    } catch (err) {
      console.error(err);
      toast("Import failed — check connection", true);
    } finally { btn.disabled = false; }
  }
}

function normalizeCsvRows(rows) {
  return rows.map(r => {
    const lower = {};
    Object.keys(r).forEach(k => { lower[k.trim().toLowerCase()] = r[k]; });
    const dateRaw = lower.date || lower.entry_date || lower.day;
    const entry_date = dateRaw ? new Date(dateRaw).toISOString().slice(0, 10) : null;
    const hourRaw = lower.hour ?? lower.entry_hour;
    const entry_hour = hourRaw !== undefined && hourRaw !== "" ? parseInt(hourRaw, 10) : null;
    const countRaw = lower.count ?? lower.total ?? lower.value;
    const count = parseInt(countRaw, 10);
    const label = lower.label || lower.section || lower.type || lower.category || null;
    const campusRaw = (lower.campus || "").toString().trim().toLowerCase();
    const campus = CAMPUSES.find(([k, l]) => k === campusRaw || l.toLowerCase() === campusRaw)?.[0] || null;
    return { entry_date, entry_hour, count, label, campus };
  });
}

/* ── DASHBOARD ────────────────────────────────────────────────────── */
function renderDashboard(body) {
  const from = new Date(); from.setDate(from.getDate() - 13);
  body.innerHTML = `
    <div class="card">
      <h2>Dashboard</h2>
      <p class="card-sub">Aggregated activity across every stat type.</p>
      <div class="field-row">
        <div><label for="dFrom">From</label><input id="dFrom" type="date" value="${from.toISOString().slice(0,10)}" /></div>
        <div><label for="dTo">To</label><input id="dTo" type="date" value="${todayStr()}" /></div>
      </div>
      <div class="field-row">
        <div>
          <label for="dCategory">Category</label>
          <select id="dCategory"><option value="">All categories</option>${ALL_CATEGORIES.map(([k, l]) => `<option value="${k}">${l}</option>`).join("")}</select>
        </div>
        <div>
          <label for="dCampus">Campus</label>
          <select id="dCampus"><option value="">All campuses</option>${CAMPUSES.map(([k, l]) => `<option value="${k}">${l}</option>`).join("")}</select>
        </div>
      </div>
      <button class="btn-stamp" id="dRun">Update dashboard</button>
    </div>
    <div class="card">
      <h2>Totals by category</h2>
      <div id="dTotals" class="summary-strip"></div>
    </div>
    <div class="card">
      <h2>Daily activity</h2>
      <div class="chart-wrap"><canvas id="dChart"></canvas></div>
    </div>
  `;
  let chartInstance = null;

  async function run_() {
    const filters = {
      from: $("#dFrom").value, to: $("#dTo").value,
      category: $("#dCategory").value, campus: $("#dCampus").value,
    };
    const rows = await dashboardRows(filters);

    const catTotals = {};
    const dayTotals = {};
    rows.forEach(r => {
      catTotals[r.category] = (catTotals[r.category] || 0) + r.count;
      dayTotals[r.entry_date] = (dayTotals[r.entry_date] || 0) + r.count;
    });

    $("#dTotals").innerHTML = Object.entries(catTotals).length
      ? Object.entries(catTotals).sort((a, b) => b[1] - a[1]).map(([k, v]) =>
          `<div class="summary-chip">${ALL_CATEGORIES.find(c => c[0] === k)?.[1] || k} <b>${v}</b></div>`).join("")
      : `<div class="empty-state">No data in this range.</div>`;

    const days = Object.keys(dayTotals).sort();
    if (chartInstance) chartInstance.destroy();
    chartInstance = new window.Chart($("#dChart"), {
      type: "bar",
      data: {
        labels: days,
        datasets: [{ label: "Interactions", data: days.map(d => dayTotals[d]), backgroundColor: "#1f3a2e" }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
        plugins: { legend: { display: false } },
      },
    });
  }

  $("#dRun").onclick = run_;
  run_();
}

/* ── UTIL ─────────────────────────────────────────────────────────── */
function fmtTime(iso) {
  try { return new Date(iso + "Z").toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }); }
  catch { return iso; }
}
function fmtDateTime(iso) {
  try {
    const d = new Date(iso + "Z");
    return d.toLocaleDateString([], { month: "short", day: "numeric" }) + ", " + d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  } catch { return iso; }
}
function campusLabel(k) { return CAMPUSES.find(c => c[0] === k)?.[1] || (k || "—"); }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

render();

</script>
